name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run unit tests
        run: uv run pytest tests/unit -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: travel_planner
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/travel_planner
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/travel_planner_test
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run integration tests
        run: uv run pytest tests/integration -v

  coverage:
    name: Coverage (≥ 80%)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      checks: write
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: travel_planner
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/travel_planner
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/travel_planner_test
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run all tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

      - name: Extract coverage %
        id: extract_cov
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import os
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          percent = round(float(root.attrib['line-rate']) * 100, 2)
          threshold = 80
          if percent >= threshold:
              msg = f"Success: {percent}% is above the accepted {threshold}%"
              conclusion = "success"
          else:
              msg = f"Warning: {percent}% is below the required {threshold}%"
              conclusion = "failure"
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"percent={percent}\n")
              f.write(f"message={msg}\n")
              f.write(f"conclusion={conclusion}\n")

      - name: Publish Coverage Report
        uses: LouisBrunner/checks-action@v2.0.0
        if: always()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "coverage"
          conclusion: ${{ steps.extract_cov.outputs.conclusion }}
          output: |
            {
              "title": "${{ steps.extract_cov.outputs.message }}",
              "summary": "Check the job summary for detailed file-by-file coverage."
            }

      - name: Fail if coverage below threshold
        if: steps.extract_cov.outputs.conclusion == 'failure'
        run: exit 1
