repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty
        language: python
        entry: ty check
        types: [python]
        pass_filenames: false
        additional_dependencies: ["ty==0.0.31"]
